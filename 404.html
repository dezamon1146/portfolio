<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — LCS3 Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0c0f;color:#e8edf5;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,157,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,0.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .wrap{position:relative;z-index:1;}
    .code{font-family:'Syne',sans-serif;font-size:clamp(6rem,20vw,10rem);font-weight:800;color:#00ff9d;line-height:1;margin-bottom:1rem;}
    h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:0.75rem;color:#e8edf5;}
    p{color:#8a9ab5;margin-bottom:2rem;font-size:0.85rem;}
    a{display:inline-block;background:#00ff9d;color:#0a0c0f;padding:12px 28px;border-radius:4px;text-decoration:none;font-size:0.8rem;letter-spacing:1.5px;font-weight:700;}
    a:hover{background:#00e088;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .b{animation:blink 1s infinite;color:#00ff9d;}
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="wrap">
    <div class="code">404</div>
    <h1>page not found<span class="b">_</span></h1>
    <p>The page you're looking for doesn't exist or was moved.</p>
    <a href="/portfolio/">← back to portfolio</a>
  </div>
</body>
</html>
